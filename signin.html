<body>

<!-- Navigation -->
<nav id="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">SB</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>

        </ul>
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
    </div>
</nav>

<!-- Auth Page Wrapper -->
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-card-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your account to continue.</p>
        </div>

        <form action="#" method="post">
            <label for="signin-email">Email Address</label>
            <input type="email" id="signin-email" name="email" placeholder="you@example.com" required autocomplete="email">

            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" name="password" placeholder="Your password" required autocomplete="current-password">

            <div class="auth-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn auth-btn">Sign In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
</div>
